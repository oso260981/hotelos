<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelOS Enterprise - Gestión Avanzada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap');
        
        body { font-family: 'Roboto', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* Estatus de habitación */
        .status-limpia { border-left: 12px solid #22c55e; }
        .status-sucia { border-left: 12px solid #f97316; }
        .status-mantenimiento { border-left: 12px solid #eab308; background-color: #fef9c3; }
        .status-planta { border-left: 12px solid #6366f1; }
        .status-vap { border-left: 12px solid #ef4444; }

        .row-shaded { 
            background-color: #dbeafe !important; 
            outline: 3px solid #1e3a8a !important; 
            z-index: 10;
            position: relative;
        }

        .hotel-grid td {
            border: 1px solid #cbd5e1;
            padding: 4px 10px;
            height: 52px;
            vertical-align: middle;
            background-color: white;
            font-size: 13px;
        }
        
        .hotel-grid th {
            background-color: #0c4a6e;
            color: white;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 30;
            border: 1px solid #075985;
            cursor: pointer;
        }

        .header-filter:hover { background-color: #075985; }

        /* Dropdown para filtros */
        .filter-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            color: #334155;
            min-width: 180px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            border-radius: 0.5rem;
            z-index: 50;
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-transform: none;
            font-family: 'Roboto', sans-serif;
        }
        
        .header-filter:focus-within .filter-dropdown,
        .header-filter:active .filter-dropdown { display: block; }

        .status-icon-limpia::before {
            content: 'X';
            display: inline-flex;
            width: 18px; height: 18px;
            background-color: #22c55e;
            color: white;
            border-radius: 50%;
            font-size: 10px;
            font-weight: bold;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
        }

        .modal-active { display: flex !important; }
        
        .form-input-group label {
            font-size: 10px;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            margin-left: 8px;
            margin-bottom: 4px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-weight: 600;
            outline: none;
        }

        .guest-item-card {
            cursor: pointer;
            transition: all 0.2s;
        }
        .guest-item-card.active {
            background-color: #eff6ff;
            border-color: #3b82f6;
            transform: translateX(5px);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- HEADER AZUL -->
    <header class="bg-[#1e3a8a] text-white p-3 flex justify-between items-center shadow-lg z-50">
        <div class="flex items-center space-x-6">
            <span class="text-2xl font-black italic tracking-tighter">HotelOS</span>
            <div id="clock" class="text-2xl font-mono font-bold bg-blue-950 px-4 py-1 rounded-lg border border-blue-800">00:00:00</div>
            <div id="header-date" class="hidden md:block text-sm font-bold bg-blue-900 px-3 py-1 rounded-lg">--/--/----</div>
            <div class="flex items-center space-x-2 bg-blue-900 px-4 py-1 rounded-lg">
                <span class="text-[10px] uppercase font-black opacity-50">Turno:</span>
                <span id="shift-badge" class="bg-white text-blue-900 px-2 rounded font-black">1</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-8">
            <div class="text-right border-r border-blue-700 pr-6">
                <p class="text-[10px] uppercase font-black opacity-50">Sesión Actual</p>
                <p class="font-bold text-lg" id="user-display">Recepcion_Alpha_1</p>
            </div>
            <button onclick="window.location.reload()" class="bg-rose-500 hover:bg-rose-600 w-11 h-11 rounded-2xl shadow-lg flex items-center justify-center transition-all active:scale-90">
                <i class="fas fa-power-off text-lg"></i>
            </button>
        </div>
    </header>

    <!-- NAVEGACIÓN -->
    <nav class="bg-slate-800 flex text-white text-xs font-bold uppercase z-40">
        <button onclick="showView('home')" class="px-8 py-3.5 hover:bg-slate-700 border-r border-slate-700 transition-all"><i class="fas fa-home mr-2"></i>Inicio</button>
        <button onclick="showView('work')" class="px-8 py-3.5 bg-slate-900 border-b-2 border-blue-500 transition-all"><i class="fas fa-th mr-2"></i>Trabajo</button>
        <button class="px-8 py-3.5 hover:bg-slate-700 border-r border-slate-700 transition-all"><i class="fas fa-file-invoice mr-2"></i>Reportes</button>
        <button class="px-8 py-3.5 hover:bg-slate-700 transition-all"><i class="fas fa-address-book mr-2"></i>Lista Pasajeros</button>
    </nav>

    <!-- VISTA INICIO -->
    <section id="view-home" class="flex-1 flex flex-col items-center justify-center p-10 space-y-16">
        <h2 class="text-3xl font-light text-slate-400 tracking-[0.4em] uppercase">Selecciona una Operación</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 w-full max-w-6xl">
            <button onclick="startShift()" class="group bg-blue-100 hover:bg-blue-600 p-10 rounded-[2.5rem] shadow-2xl border-b-[16px] border-blue-400 transition-all text-left h-80 flex flex-col justify-between">
                <div>
                    <i class="fas fa-play-circle text-6xl text-blue-600 group-hover:text-white mb-6"></i>
                    <h3 class="text-3xl font-black group-hover:text-white uppercase">Empieza Turno</h3>
                </div>
                <ul class="text-sm text-slate-500 group-hover:text-blue-100 font-bold space-y-1">
                    <li>• Cierra sesión anterior</li>
                    <li>• Baja de habitaciones</li>
                    <li>• Genera reporte inicial</li>
                </ul>
            </button>
            <button class="group bg-emerald-100 hover:bg-emerald-600 p-10 rounded-[2.5rem] shadow-2xl border-b-[16px] border-emerald-400 transition-all text-left h-80 flex flex-col justify-between">
                <div>
                    <i class="fas fa-file-invoice-dollar text-6xl text-emerald-600 group-hover:text-white mb-6"></i>
                    <h3 class="text-3xl font-black group-hover:text-white uppercase">Sacar Reporte</h3>
                </div>
                <p class="text-sm text-slate-500 group-hover:text-emerald-50 font-bold italic">Consulte corte de caja, ocupación y ventas del día.</p>
            </button>
            <button class="group bg-pink-100 hover:bg-pink-600 p-10 rounded-[2.5rem] shadow-2xl border-b-[16px] border-pink-400 transition-all text-left h-80 flex flex-col justify-between">
                <div>
                    <i class="fas fa-users-cog text-6xl text-pink-600 group-hover:text-white mb-6"></i>
                    <h3 class="text-3xl font-black group-hover:text-white uppercase">Lista Pasajeros</h3>
                </div>
                <p class="text-sm text-slate-500 group-hover:text-pink-50 font-bold italic">Registro oficial y búsqueda para autoridades.</p>
            </button>
        </div>
    </section>

    <!-- VISTA TRABAJO -->
    <section id="view-work" class="hidden flex-1 flex flex-col bg-slate-200">
        <div class="bg-slate-900 p-2 flex space-x-4 items-center px-6">
            <span class="bg-red-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-sm">Sucia</span>
            <span class="bg-green-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-sm">X Limpia</span>
            <span class="bg-yellow-500 text-black px-3 py-1 rounded-full text-[10px] font-black uppercase shadow-sm">Mantenimiento</span>
            <div class="flex-1"></div>
            <div class="relative">
                <input type="text" id="global-search" oninput="applyGlobalSearch()" placeholder="Búsqueda rápida..." class="bg-slate-800 text-white rounded-xl px-10 py-2 text-xs w-80 border border-slate-700 outline-none">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
            </div>
        </div>

        <div class="flex-1 overflow-auto bg-white">
            <table class="w-full hotel-grid table-fixed min-w-[2100px]">
                <thead>
                    <tr id="header-row">
                        <!-- Generado por JS -->
                    </tr>
                </thead>
                <tbody id="rooms-tbody"></tbody>
            </table>
        </div>

        <footer class="bg-slate-900 text-white p-3 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <span class="text-[11px] font-black uppercase text-blue-400 tracking-tighter">PISO:</span>
                <div class="flex bg-slate-800 p-1 rounded-xl" id="floor-tabs">
                    <button onclick="changeFloor('PB')" class="bg-blue-600 px-6 py-1.5 rounded-lg text-xs font-black shadow-lg">PB</button>
                    <button onclick="changeFloor('1')" class="px-6 py-1.5 rounded-lg text-xs font-bold text-slate-400">1°</button>
                    <button onclick="changeFloor('2')" class="px-6 py-1.5 rounded-lg text-xs font-bold text-slate-400">2°</button>
                </div>
            </div>
        </footer>
    </section>

    <!-- MODAL REGISTRO -->
    <div id="modal-register" class="fixed inset-0 bg-slate-900/95 hidden z-[100] items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-[90vw] rounded-[3rem] shadow-2xl flex overflow-hidden h-[90vh] border border-slate-200">
            <div class="w-96 bg-slate-50 border-r flex flex-col">
                <div class="p-10 border-b bg-white">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="text-xl font-black text-slate-800 uppercase italic">Registro</h4>
                        <span id="reg-count-badge" class="bg-slate-900 text-white px-3 py-1 rounded-full text-[10px] font-bold">0</span>
                    </div>
                    <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                        <h3 id="modal-hab-id" class="text-4xl font-black text-blue-900">--</h3>
                    </div>
                </div>
                <div id="guest-sidebar-list" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
                <div class="p-10 bg-slate-100 space-y-4">
                    <button onclick="addNewGuest()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black uppercase text-xs">Nuevo Acompañante</button>
                    <button onclick="confirmRegistration()" class="w-full bg-emerald-500 text-white py-5 rounded-3xl font-black uppercase text-sm shadow-xl">Guardar Todo</button>
                    <button onclick="closeModal('modal-register')" class="w-full text-slate-400 font-bold text-[10px] uppercase py-2">Cancelar</button>
                </div>
            </div>

            <div class="flex-1 p-12 overflow-y-auto bg-white relative">
                <div class="max-w-5xl mx-auto">
                    <h2 class="text-4xl font-black text-slate-800 uppercase italic mb-10">Datos del Huésped</h2>
                    <div class="grid grid-cols-12 gap-10">
                        <div class="col-span-5 space-y-8">
                            <div class="bg-slate-800 aspect-video rounded-[2.5rem] flex items-center justify-center relative overflow-hidden group shadow-2xl">
                                <i class="fas fa-camera text-6xl text-slate-700"></i>
                            </div>
                            <div class="form-input-group"><label>Tipo ID</label><select id="f-id-type" class="form-input"><option>INE</option><option>Pasaporte</option></select></div>
                            <div class="form-input-group"><label>No. ID</label><input id="f-id-num" type="text" class="form-input font-mono"></div>
                        </div>
                        <div class="col-span-7 space-y-6">
                            <div class="grid grid-cols-2 gap-6">
                                <div class="form-input-group"><label>Nombre(s)</label><input id="f-name" type="text" class="form-input"></div>
                                <div class="form-input-group"><label>Apellidos</label><input id="f-apellidos" type="text" class="form-input"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-6">
                                <div class="form-input-group"><label>Teléfono</label><input id="f-tel" type="text" class="form-input"></div>
                                <div class="form-input-group"><label>Email</label><input id="f-mail" type="email" class="form-input"></div>
                            </div>
                            <div class="grid grid-cols-3 gap-6">
                                <div class="form-input-group"><label>Nacionalidad</label><input id="f-nat" type="text" class="form-input"></div>
                                <div class="form-input-group"><label>Nacimiento</label><input id="f-birth" type="date" class="form-input"></div>
                                <div class="form-input-group"><label>Género</label><select id="f-gender" class="form-input"><option>Masculino</option><option>Femenino</option></select></div>
                            </div>
                            <div class="grid grid-cols-3 gap-6">
                                <div class="form-input-group col-span-2"><label>Dirección Fiscal</label><input id="f-address" type="text" class="form-input"></div>
                                <div class="form-input-group"><label>C.P.</label><input id="f-cp" type="text" class="form-input"></div>
                            </div>
                            <div class="grid grid-cols-3 gap-6">
                                <div class="form-input-group"><label>Ciudad</label><input id="f-city" type="text" class="form-input"></div>
                                <div class="form-input-group"><label>Estado</label><input id="f-state" type="text" class="form-input"></div>
                                <div class="form-input-group"><label>Placas</label><input id="f-placas" type="text" class="form-input font-mono"></div>
                            </div>
                            <div class="pt-6 border-t flex space-x-6">
                                <select id="f-is-titular" class="form-input flex-1 font-black text-blue-900"><option value="true">TITULAR</option><option value="false">ACOMPAÑANTE</option></select>
                                <label class="flex items-center space-x-4 p-4 bg-amber-50 rounded-2xl border border-amber-100 cursor-pointer flex-1">
                                    <input type="checkbox" id="f-minor" class="w-6 h-6 rounded-lg text-amber-600">
                                    <span class="text-[10px] font-black text-amber-900 uppercase">Menor de Edad</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="mt-12 flex space-x-4">
                        <button onclick="saveCurrentGuestData()" class="flex-1 bg-blue-600 text-white py-6 rounded-3xl font-black uppercase text-sm shadow-2xl">Guardar Huésped</button>
                        <button onclick="deleteGuest()" class="px-10 bg-rose-50 text-rose-600 border border-rose-100 py-6 rounded-3xl"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-3xl shadow-2xl translate-y-48 transition-all duration-500 z-[200] border-l-8 border-blue-500 flex items-center space-x-6">
        <i id="toast-icon" class="fas fa-info-circle text-blue-400 text-2xl"></i>
        <p id="toast-message" class="font-black text-lg">Mensaje</p>
    </div>

    <script>
        const rooms = [];
        const basePrice = 500.00;
        let selectedRoomIdx = null;
        let selectedGuestIdx = 0;
        let tempGuests = [];
        const activeFilters = {};

        const cols = [
            { id: 'status', label: 'Status', w: '120px', type: 'select', opts: ['Limpia', 'Sucia', 'Mantenimiento'] },
            { id: 'id', label: 'Hab', w: '80px', type: 'text' },
            { id: 'stay', label: 'Estadía', w: '120px', type: 'select', opts: ['S', 'SQ', 'P'] },
            { id: 'days', label: 'Días', w: '75px', type: 'text' },
            { id: 'people', label: 'Pers', w: '75px', type: 'text' },
            { id: 'reg', label: 'Registro', w: '140px', type: 'none' },
            { id: 'pay', label: 'Pago', w: '140px', type: 'select', opts: ['E', 'TC'] },
            { id: 'price', label: 'Precio', w: '120px', type: 'text' },
            { id: 'h_ent', label: 'Entrada', w: '120px', type: 'none' },
            { id: 'btn_e', label: 'E', w: '65px', type: 'none' },
            { id: 'h_sal', label: 'Salida', w: '120px', type: 'none' },
            { id: 'btn_s', label: 'S', w: '65px', type: 'none' },
            { id: 'name', label: 'Titular', w: '260px', type: 'text' },
            { id: 'extra', label: 'Extra', w: '85px', type: 'text' },
            { id: 'opt', label: 'Opciones', w: '110px', type: 'none' },
            { id: 'ticket', label: 'Ticket', w: '100px', type: 'none' }
        ];

        function initData() {
            // Llenar con Data Dummy
            const dummyNames = ["ISRAEL DE LOS SANTOS", "MARIA GARCIA", "JUAN PEREZ", "ELENA RODRIGUEZ", "ROBERTO SANCHEZ"];
            for (let i = 1; i <= 30; i++) {
                const id = i.toString().padStart(3, '0');
                let status = 'limpia';
                let huespedes = [];
                let stay = '';
                let days = 0;
                let pay = '';
                let price = 0;
                let h_ent = '', f_ent = '';

                if (i === 1) status = 'mantenimiento';
                if (i === 4) {
                    status = 'sucia'; huespedes = [{ nombre: 'ISRAEL', apellidos: 'DE LOS SANTOS', isTitular: true, placas: 'ABC-123' }];
                    stay = 'SQ'; days = 2; pay = 'E'; price = 1000; h_ent = '12:04 PM'; f_ent = '18/04/2026';
                }
                if (i === 8) status = 'sucia'; // Solo sucia sin huesped

                rooms.push({
                    id, status, floor: i < 11 ? 'PB' : '1', capacidad: i % 5 === 0 ? 4 : 2,
                    tipoEstadia: stay, dias: days, huespedes, formaPago: pay, precio: price,
                    horaEntrada: h_ent, fechaEntrada: f_ent, horaSalida: '', fechaSalida: '', shaded: i === 4
                });
            }
            renderHeader();
            renderGrid();
        }

        function renderHeader() {
            const row = document.getElementById('header-row');
            row.innerHTML = '';
            cols.forEach(c => {
                const th = document.createElement('th');
                th.className = 'header-filter';
                th.tabIndex = 0;
                
                let filterUI = '';
                if (c.type === 'text') {
                    filterUI = `<div class="filter-dropdown"><input type="text" class="w-full p-2 bg-slate-100 rounded text-xs text-black" oninput="applyHeaderFilter('${c.id}', this.value)" placeholder="Buscar..."></div>`;
                } else if (c.type === 'select') {
                    filterUI = `<div class="filter-dropdown"><select class="w-full p-2 bg-slate-100 rounded text-xs text-black" onchange="applyHeaderFilter('${c.id}', this.value)"><option value="">Todos</option>${c.opts.map(o => `<option value="${o}">${o}</option>`)}</select></div>`;
                }

                th.innerHTML = `<div>${c.label} <i class="fas fa-filter ml-1 text-[8px] opacity-40"></i></div>${filterUI}`;
                row.appendChild(th);
            });
        }

        function applyHeaderFilter(id, val) { activeFilters[id] = val; renderGrid(); }
        function applyGlobalSearch() { renderGrid(); }

        function renderGrid() {
            const tbody = document.getElementById('rooms-tbody');
            tbody.innerHTML = '';
            const search = document.getElementById('global-search').value.toLowerCase();

            const filtered = rooms.filter(r => {
                const titular = r.huespedes.find(h => h.isTitular) || { nombre: '', apellidos: '' };
                const fullName = `${titular.nombre} ${titular.apellidos}`.toLowerCase();
                
                if (search && !r.id.includes(search) && !fullName.includes(search)) return false;
                if (activeFilters.id && !r.id.includes(activeFilters.id)) return false;
                if (activeFilters.status && !r.status.toLowerCase().includes(activeFilters.status.toLowerCase())) return false;
                if (activeFilters.name && !fullName.includes(activeFilters.name.toLowerCase())) return false;
                
                return true;
            });

            filtered.forEach(r => {
                const realIdx = rooms.indexOf(r);
                const titular = r.huespedes.find(h => h.isTitular) || { nombre: '', apellidos: '' };
                const extra = Math.max(0, r.huespedes.length - r.capacidad);
                const isBlocked = (r.status === 'mantenimiento' || (r.status === 'sucia' && r.huespedes.length === 0));

                const tr = document.createElement('tr');
                tr.className = `status-${r.status} ${r.shaded ? 'row-shaded' : ''}`;
                tr.innerHTML = `
                    <td class="font-bold ${r.status === 'limpia' ? 'status-icon-limpia' : ''}">
                        <select onchange="rooms[${realIdx}].status=this.value;renderGrid()"><option value="limpia" ${r.status === 'limpia' ? 'selected' : ''}>X=Limpia</option><option value="sucia" ${r.status === 'sucia' ? 'selected' : ''}>=Sucia</option><option value="mantenimiento" ${r.status === 'mantenimiento' ? 'selected' : ''}>M=Mant.</option></select>
                    </td>
                    <td class="text-center font-black text-blue-900">${r.id}</td>
                    <td><select onchange="updateStay(${realIdx}, this.value)" ${isBlocked ? 'disabled' : ''}><option value="">-</option><option value="S" ${r.tipoEstadia === 'S' ? 'selected' : ''}>S</option><option value="SQ" ${r.tipoEstadia === 'SQ' ? 'selected' : ''}>SQ</option><option value="P" ${r.tipoEstadia === 'P' ? 'selected' : ''}>P</option></select></td>
                    <td><input type="number" value="${r.dias}" onchange="updateDays(${realIdx}, this.value)" class="text-center font-bold no-spinner" ${isBlocked ? 'disabled' : ''}></td>
                    <td class="text-center font-black">${r.huespedes.length}</td>
                    <td class="text-center"><button onclick="openRegister(${realIdx})" class="bg-slate-800 text-white text-[9px] px-3 py-1.5 rounded-lg font-black ${isBlocked ? 'opacity-20 pointer-events-none' : ''}">REGISTRAR +</button></td>
                    <td><select onchange="rooms[${realIdx}].formaPago=this.value" class="text-[10px] font-bold" ${isBlocked ? 'disabled' : ''}><option value="">-</option><option value="E" ${r.formaPago === 'E' ? 'selected' : ''}>Efectivo</option><option value="TC" ${r.formaPago === 'TC' ? 'selected' : ''}>Tarjeta</option></select></td>
                    <td class="text-right font-mono font-bold text-blue-800">$ ${r.precio.toFixed(2)}</td>
                    <td class="text-[9px] font-bold leading-none text-slate-400">${r.horaEntrada ? `<div>${r.horaEntrada}</div><div>${r.fechaEntrada}</div>` : '-'}</td>
                    <td class="text-center"><button onclick="stampTime(${realIdx},'entrada')" class="text-blue-500"><i class="fas fa-plus-circle"></i></button></td>
                    <td class="text-[9px] font-bold leading-none text-slate-400">-</td>
                    <td class="text-center"><button onclick="stampTime(${realIdx},'salida')" class="text-rose-500"><i class="fas fa-plus-circle"></i></button></td>
                    <td class="font-black uppercase truncate text-[11px]">${titular.nombre} ${titular.apellidos}</td>
                    <td class="text-center font-bold ${extra > 0 ? 'text-orange-600 bg-orange-50' : 'text-slate-200'}">${extra}</td>
                    <td><button class="bg-slate-100 px-3 py-1 rounded text-[9px] font-black uppercase ${r.huespedes.length === 0 ? 'opacity-10 pointer-events-none' : ''}">Opciones</button></td>
                    <td><button class="bg-blue-600 text-white px-3 py-1 rounded text-[9px] font-black uppercase ${r.huespedes.length === 0 ? 'opacity-10 pointer-events-none' : ''}">Ticket</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStay(idx, v) { rooms[idx].tipoEstadia = v; rooms[idx].precio = basePrice * (v === 'SQ' ? 1 : 1); renderGrid(); }
        function updateDays(idx, v) { rooms[idx].dias = v; rooms[idx].precio = basePrice * (parseInt(v) || 1); renderGrid(); }
        function stampTime(idx, type) { const now = new Date(); rooms[idx][`hora${type === 'entrada' ? 'Entrada' : 'Salida'}`] = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); rooms[idx][`fecha${type === 'entrada' ? 'Entrada' : 'Salida'}`] = now.toLocaleDateString(); renderGrid(); }

        function openRegister(idx) {
            selectedRoomIdx = idx; tempGuests = rooms[idx].huespedes.map(g => ({...g}));
            if (tempGuests.length === 0) addNewGuest(); else selectGuest(0);
            document.getElementById('modal-hab-id').textContent = rooms[idx].id;
            document.getElementById('modal-register').classList.add('modal-active');
        }

        function addNewGuest() { tempGuests.push({ nombre: '', apellidos: '', idType: 'INE', idNum: '', telefono: '', email: '', nacionalidad: 'Mexicana', isTitular: tempGuests.length === 0 }); selectGuest(tempGuests.length - 1); }
        function selectGuest(i) { saveCurrentGuestData(false); selectedGuestIdx = i; const g = tempGuests[i]; document.getElementById('f-name').value = g.nombre; document.getElementById('f-apellidos').value = g.apellidos; updateSidebar(); }
        function saveCurrentGuestData(notify = true) { if (tempGuests.length === 0) return; const g = tempGuests[selectedGuestIdx]; g.nombre = document.getElementById('f-name').value.toUpperCase(); g.apellidos = document.getElementById('f-apellidos').value.toUpperCase(); updateSidebar(); if (notify) showToast("Guardado temporal"); }
        function updateSidebar() { const l = document.getElementById('guest-sidebar-list'); l.innerHTML = ''; tempGuests.forEach((g, i) => { const c = document.createElement('div'); c.className = `guest-item-card p-4 rounded-2xl border bg-white shadow-sm flex items-center space-x-3 ${selectedGuestIdx === i ? 'active' : ''}`; c.onclick = () => selectGuest(i); c.innerHTML = `<div class="w-10 h-10 rounded-xl ${g.isTitular ? 'bg-blue-600' : 'bg-slate-200'} flex items-center justify-center text-white text-xs font-black">${g.isTitular ? 'T' : i+1}</div><div class="flex-1 truncate"><p class="text-xs font-black">${g.nombre || '(Sin nombre)'}</p></div>`; l.appendChild(c); }); }
        function confirmRegistration() { saveCurrentGuestData(false); rooms[selectedRoomIdx].huespedes = [...tempGuests]; rooms[selectedRoomIdx].status = 'sucia'; closeModal('modal-register'); renderGrid(); }
        function closeModal(id) { document.getElementById(id).classList.remove('modal-active'); }
        function showView(v) { document.getElementById('view-home').classList.add('hidden'); document.getElementById('view-work').classList.add('hidden'); document.getElementById(`view-${v}`).classList.remove('hidden'); }
        function startShift() { showToast("Turno Iniciado"); setTimeout(() => showView('work'), 500); }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toast-message').textContent = m; t.classList.remove('translate-y-48'); setTimeout(() => t.classList.add('translate-y-48'), 3000); }

        window.onload = () => { initData(); setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString(), 1000); };
    </script>
</body>
</html>
